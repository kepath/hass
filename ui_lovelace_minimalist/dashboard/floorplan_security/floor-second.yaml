---
type: "picture-elements"
image: "local/floorplan/2nd/dark.png"
elements:
  ############## COMMON ELEMENTS ###############################

  #### IMAGES ####
  # BED E
  - type: "image"
    entity: "light.bed_e_light_bed_e_light"
    style:
      left: "50%"
      top: "50%"
      width: "100%"
    state_image:
      "on": "local/floorplan/2nd/bed_e_on.png"
      "off": "local/floorplan/transparent.png"
      "unavailable": "local/floorplan/transparent.png"
      "unknown": "local/floorplan/transparent.png"
    tap_action:
      action: "none"
    hold_action:
      action: "none"
  # LOFT
  - type: "image"
    entity: "binary_sensor.zigbee_door_sensor_loft_loft_contact_sensor"
    style:
      left: "50%"
      top: "50%"
      width: "100%"
    state_image:
      "on": "local/floorplan/2nd/loft_door.png"
      "off": "local/floorplan/transparent.png"
      "unavailable": "local/floorplan/transparent.png"
      "unknown": "local/floorplan/transparent.png"
    tap_action:
      action: "none"
    hold_action:
      action: "none"

  #### LIGHTS ####
  # BED E
  - type: "custom:button-card"
    template: "card_kepath_floorplan_binary_item"
    entity: "light.bed_e_light_bed_e_light"
    variables:
      floorplan_item_tooltip: "bed e light"
    style:
      left: "75%"
      top: "35%"
      color: "rgba(100, 100, 100, 0.0)"
  # BED E LAMP
  - type: "custom:button-card"
    template: "card_kepath_floorplan_binary_item"
    entity: "light.mss425e_6025_outlet_3"
    variables:
      floorplan_item_tooltip: "bed e lamp"
    style:
      left: "62%"
      top: "67%"
      color: "rgba(100, 100, 100, 0.0)"

  #### FLOOR NAVIGATION #####
  - type: "custom:button-card"
    template: "card_kepath_floorplan_selector_buttons"
    style:
      left: "5%"
      top: "15%"

  ############## COMMON ELEMENTS END ###########################

  # MOTION
  # MIDDLE HALLWAY G3 FLEX
  - type: "custom:button-card"
    template: "card_kepath_floorplan_camera"
    entity: "camera.middle_hallway_g3_flex_medium"
    variables:
      floorplan_camera_icon: "mdi:cctv"
      floorplan_camera_motion_sensor: "binary_sensor.middle_hallway_g3_flex_motion"
      floorplan_camera_last_activity_entity: "sensor.floorplan_dates_template_generated"
      floorplan_camera_last_activity_attribute: "middle_hallway_g3_flex_last_motion_detected"
      floorplan_camera_view_borders: "top,left"
    style:
      left: "56%"
      top: "68%"
      color: "rgba(100, 100, 100, 0.0)"
  # BED E MOTION SENSOR
  - type: "custom:button-card"
    template: "card_kepath_floorplan_camera"
    entity: "binary_sensor.zigbee_motion_sensor_bed_e_occupancy"
    variables:
      floorplan_camera_icon: "mdi:human-greeting"
      floorplan_camera_motion_sensor: "binary_sensor.zigbee_motion_sensor_bed_e_occupancy"
      floorplan_camera_last_activity_entity: "sensor.floorplan_dates_template_generated"
      floorplan_camera_last_activity_attribute: "motion_sensor_bed_e_last_activity"
      floorplan_camera_view_borders: "right"
    style:
      left: "60%"
      top: "26%"
      color: "rgba(100, 100, 100, 0.0)"
  # NEST PROTECT TOP FLOOR
  - type: "custom:button-card"
    template: "card_kepath_floorplan_nest_protect"
    entity: "binary_sensor.nest_protect_top_floor_occupancy"
    variables:
      floorplan_nest_protect_last_activity_entity: "sensor.floorplan_dates_template_generated"
      floorplan_nest_protect_last_activity_attribute: "nest_protect_top_floor_last_activity"
      floorplan_nest_protect_co_status: "binary_sensor.nest_protect_top_floor_co_status"
      floorplan_nest_protect_heat_status: "binary_sensor.nest_protect_top_floor_heat_status"
      floorplan_nest_protect_smoke_status: "binary_sensor.nest_protect_top_floor_smoke_status"
    style:
      left: "49%"
      top: "27%"

  # DOORS
  # LOFT LADDER
  - type: "custom:button-card"
    template: "card_kepath_floorplan_door"
    entity: "binary_sensor.zigbee_door_sensor_loft_loft_contact_sensor"
    variables:
      floorplan_door_last_opened_entity: "sensor.floorplan_dates_template_generated"
      floorplan_door_last_opened_attribute: "loft_ladder_last_opened"
      floorplan_door_closed_icon: "mdi:stairs"
      floorplan_door_open_icon: "mdi:stairs-down"
    style:
      left: "50%"
      top: "11%"
      color: "rgba(100, 100, 100, 0.0)"
