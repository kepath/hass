      action: "none"

  #### LIGHTS ####
  # BED A
  - type: "custom:button-card"
    template: "card_kepath_floorplan_binary_item"
    entity: "light.bed_a_light_bed_a_light"
    variables:
      floorplan_item_tooltip: "bed a light"
    style:
      left: "28%"
      top: "55%"
      color: "rgba(100, 100, 100, 0.0)"
  # EN-SUITE
  - type: "custom:button-card"
    template: "card_kepath_floorplan_binary_item"
