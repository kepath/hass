  #### FLOOR NAVIGATION #####
  - type: "custom:button-card"
    template: "card_kepath_floorplan_selector_buttons"
    style:
      left: "5%"
      top: "15%"

  ############## COMMON ELEMENTS END ###########################

  #### PLUGS #####
  # ARCADE PC
  - type: "custom:button-card"
    template: "card_kepath_floorplan_binary_item_plug"
    entity: "switch.zigbee_outlet_switch_arcade_pc_switch"
    variables:
      floorplan_item_power_usage_denotes_on: false
      floorplan_item_binary_device_off_is_stopped: false
      floorplan_item_tooltip: "arcade pc power switch"
    style:
      left: "64%"
      top: "68%"
      color: "rgba(100, 100, 100, 0.0)"
  # DRINKS FRIDGE
  # - type: "custom:button-card"
  #   template: "card_kepath_floorplan_binary_item_plug"
  #   entity: "switch.drinks_fridge_plug_bed_c"
  #   variables:
  #     floorplan_item_power_usage_denotes_on: false
  #     floorplan_item_binary_device_power: "sensor.drinks_fridge_plug_bed_c_unifi_current_consumption"
  #     floorplan_item_binary_device_off_is_stopped: false
  #     floorplan_item_binary_device_more_info: "sensor.drinks_fridge_plug_bed_c_unifi_current_consumption"
  #     floorplan_item_tooltip: "drinks fridge power switch"
  #   style:
  #     left: "85%"
  #     top: "68%"
  #     color: "rgba(100, 100, 100, 0.0)"
  # BED A FIRESTICK
  - type: "custom:button-card"
    template: "card_kepath_floorplan_binary_item_plug"
    entity: "switch.zigbee_outlet_switch_amazon_firestick_bed_a_switch"
    variables:
      floorplan_item_power_usage_denotes_on: false
      floorplan_item_binary_device_off_is_stopped: false
      floorplan_item_tooltip: "fire-tv power switch"
    style:
      left: "39%"
      top: "61%"
      color: "rgba(100, 100, 100, 0.0)"

  # THERMOSTATS
  # NEST MIDDLE FLOOR
  - type: "custom:button-card"
    template: "card_kepath_floorplan_thermostat"
    entity: "climate.nest_middle_floor"
    # triggers_update: "all"
    variables:
      floorplan_thermostat_humidity: "sensor.nest_middle_floor_humidity"
      floorplan_thermostat_current_temperature_attribute: "current_temperature"
      floorplan_thermostat_wanted_temperature_attribute: "temperature"
      floorplan_thermostat_action_attribute: "hvac_action"
      floorplan_thermostat_action_use_state: false
    style:
      left: "56%"
      top: "40%"
      color: "rgba(100, 100, 100, 0.0)"
  # HEAT PUMP
  - type: "custom:button-card"
    template: "card_kepath_floorplan_thermostat"
    entity: "water_heater.air_to_water_heat_pump"
    # triggers_update: "all"
    variables:
      floorplan_thermostat_humidity: ""
      floorplan_thermostat_current_temperature_attribute: "current_temperature"
      floorplan_thermostat_wanted_temperature_attribute: "temperature"
      # floorplan_thermostat_action_attribute:
      floorplan_thermostat_action_use_state: true
    style:
      left: "63%"
      top: "34%"
      color: "rgba(100, 100, 100, 0.0)"

 #### FANS ####
  # BED C
  - type: "custom:button-card"
    template: "card_kepath_floorplan_binary_item"
    entity: "fan.bed_c_fan"
    variables:
      basic_simple_states:
        warning_state:
          icon: "mdi:fan-alert"
        error_state:
          icon: "mdi:fan-alert"
      common_button_icon_styles:
        default_state:
          use_themes: false
          icon: "mdi:fan-off"
          icon_color: "rgba(var(--color-theme),1)"
          background_color: "rgba(130, 130, 130, 0.3)"
        unknown_state:
          icon: "mdi:fan-alert"
        unset_state:
          icon: "mdi:fan-alert"
      binary_switch_state:
        on_state:
          use_themes: true
          icon: "mdi:fan"
          icon_color: "rgba(var(--color-green),1)"
          background_color: "rgba(130, 130, 130, 0.3)"
        off_state:
          use_themes: false
          icon: "mdi:fan-off"
          icon_color: "rgba(var(--color-theme),1)"
          background_color: "rgba(130, 130, 130, 0.3)"
      floorplan_item_tooltip: "bed c fan"
    style:
      left: "63%"
      top: "63%"
      color: "rgba(100, 100, 100, 0.0)"
