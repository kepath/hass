  # THERMOSTATS
  # NEST BOTTOM FLOOR
  - type: "custom:button-card"
    template: "card_kepath_floorplan_thermostat"
    entity: "climate.nest_bottom_floor"
    # triggers_update: "all"
    variables:
      floorplan_thermostat_humidity: "sensor.nest_bottom_floor_humidity"
      floorplan_thermostat_current_temperature_attribute: "current_temperature"
      floorplan_thermostat_wanted_temperature_attribute: "temperature"
      floorplan_thermostat_action_attribute: "hvac_action"
