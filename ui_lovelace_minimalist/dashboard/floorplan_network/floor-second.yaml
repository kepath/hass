---
type: "picture-elements"
image: "local/floorplan/2nd/dark.png"
elements:
  ############## COMMON ELEMENTS ###############################

  #### IMAGES ####
  # BED E
  - type: "image"
    entity: "light.bed_e_light_bed_e_light"
    style:
      left: "50%"
      top: "50%"
      width: "100%"
    state_image:
      "on": "local/floorplan/2nd/bed_e_on.png"
      "off": "local/floorplan/transparent.png"
      "unavailable": "local/floorplan/transparent.png"
      "unknown": "local/floorplan/transparent.png"
    tap_action:
      action: "none"
    hold_action:
      action: "none"
  # LOFT
  - type: "image"
    entity: "binary_sensor.zigbee_door_sensor_loft_loft_contact_sensor"
    style:
      left: "50%"
      top: "50%"
      width: "100%"
    state_image:
      "on": "local/floorplan/2nd/loft_door.png"
      "off": "local/floorplan/transparent.png"
      "unavailable": "local/floorplan/transparent.png"
      "unknown": "local/floorplan/transparent.png"
    tap_action:
      action: "none"
    hold_action:
      action: "none"

  #### LIGHTS ####
  # BED E
  - type: "custom:button-card"
    template: "card_kepath_floorplan_binary_item"
    entity: "light.bed_e_light_bed_e_light"
    variables:
      floorplan_item_tooltip: "bed e light"
    style:
      left: "75%"
      top: "35%"
      color: "rgba(100, 100, 100, 0.0)"
  # BED E LAMP
  - type: "custom:button-card"
    template: "card_kepath_floorplan_binary_item"
    entity: "light.mss425e_6025_outlet_3"
    variables:
      floorplan_item_tooltip: "bed e lamp"
    style:
      left: "62%"
      top: "67%"
      color: "rgba(100, 100, 100, 0.0)"

  #### FLOOR NAVIGATION #####
  - type: "custom:button-card"
    template: "card_kepath_floorplan_selector_buttons"
    style:
      left: "5%"
      top: "15%"

  ############## COMMON ELEMENTS END ###########################

  - type: "custom:button-card"
    template: "card_kepath_floorplan_network_item"
    entity: "sensor.usw_lite_8port_bed_e_nvidia_shield_combined_data_rate"
    variables:
      floorplan_network_device_icon: "simple-icons:nvidia"
      floorplan_network_device_color: "#76B900"
      floorplan_network_device_poe:
    style:
      left: "61%"
      top: "42%"
      color: "rgba(100, 100, 100, 0.0)"

  - type: "custom:button-card"
    template: "card_kepath_floorplan_network_item"
    entity: "sensor.usw_lite_8port_bed_e_big_pc_combined_data_rate"
    variables:
      floorplan_network_device_icon: "mdi:desktop-tower"
      floorplan_network_device_color: ""
      floorplan_network_device_poe:
    style:
      left: "60%"
      top: "37%"
      color: "rgba(100, 100, 100, 0.0)"

  - type: "custom:button-card"
    template: "card_kepath_floorplan_network_item"
    entity: "sensor.usw_lite_8port_bed_e_caldigit_dock_combined_data_rate"
    variables:
      floorplan_network_device_icon: "mdi:monitor-arrow-down"
      floorplan_network_device_color: ""
      floorplan_network_device_poe: "sensor.usw_flex_loft_dlpc_isolated_poe_power"
    style:
      left: "61%"
      top: "55%"
      color: "rgba(100, 100, 100, 0.0)"

  - type: "custom:button-card"
    template: "card_kepath_floorplan_network_item"
    entity: "sensor.usw_flex_loft_dlpc_combined_data_rate"
    variables:
      floorplan_network_device_icon: "mdi:file-arrow-up-down"
      floorplan_network_device_color: ""
      floorplan_network_device_poe:
    style:
      left: "95%"
      top: "18%"
      color: "rgba(100, 100, 100, 0.0)"

  - type: "custom:button-card"
    template: "card_kepath_floorplan_network_item"
    entity: "sensor.iphone_12_dan_combined_data_rate"
    variables:
      floorplan_network_device_icon: "mdi:alpha-d-box-outline"
      floorplan_network_device_color: ""
      floorplan_network_device_poe:
    style:
      left: "15%"
      top: "30%"
      color: "rgba(100, 100, 100, 0.0)"
