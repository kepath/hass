---
navigate_to_parent:
  variables:
    metadata:
      page_name: "navigate_to_parent.yaml"
    navigation_to_parent_from_entity:
      evaluated_entity: "update.home_assistant_core_update"
      return_type: "failsafe"
  tap_action:
    action: "navigate"
    navigation_path: >
      [[[
        var parentPath = "/config/integrations/";
        var parentId = "dashboard";
        var entityId;
        var returnType;
        if (typeof variables?.navigation_to_parent_from_entity?.evaluated_entity !== 'undefined' && variables?.navigation_to_parent_from_entity?.evaluated_entity != "") {
          entityId = variables?.navigation_to_parent_from_entity?.evaluated_entity;
        } else {
          hass.callService(`system_log`, `write`, {level: `warning`, message: `error in page: ${variables?.metadata?.page_name} with variables?.navigation_to_parent_from_entity?.evaluated_entity: ${variables?.navigation_to_parent_from_entity?.evaluated_entity}`});
        }
        if (typeof variables?.navigation_to_parent_from_entity?.return_type !== 'undefined') {
          returnType = variables?.navigation_to_parent_from_entity?.return_type;
        } else {
          hass.callService(`system_log`, `write`, {level: `warning`, message: `error in page: ${variables?.metadata?.page_name} with variables?.navigation_to_parent_from_entity?.return_type: ${variables?.navigation_to_parent_from_entity?.return_type}`});
        }

        if (entityId) {
          switch(returnType) {

            case "device":
              parentPath = "/config/devices/device/";
              if (hass.entities[entityId]) {
                if (hass.entities[entityId]?.device_id) {
                  parentId = hass.entities[entityId]?.device_id;
                }
              }
              break;

            case "integration":
              parentPath = "/config/integrations/integration/";
              if (hass.entities[entityId]) {
                if (hass.entities[entityId]?.platform) {
                  parentId = hass.entities[entityId]?.platform;
                }
              }
              break;

            case "failsafe":
              parentPath = "/config/integrations/";
              parentId = "dashboard";
              break;

            default:
              break;
          }
        }

        return parentPath + parentId;
      ]]]
