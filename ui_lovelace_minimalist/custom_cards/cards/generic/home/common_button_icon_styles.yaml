              hass.callService(`system_log`, `write`, {level: `warning`, message:`error in page: ${variables?.metadata?.page_name} with variables?.common_button_icon_styles?.unset_state?.icon_color: ${variables?.common_button_icon_styles?.unset_state?.icon_color}`});
