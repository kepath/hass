            }
            if (useThemes) {
              for (let i = 0; i < colorOptions.length; i++) {
                if (importedColor.includes(colorOptions[i])){
                  returnedColor = "rgba(var(--color-" + importedColor + "), " + importedColorAlpha + ")";
                }
              }
              if (returnedColor.length == 0) {
                hass.callService(`system_log`, `write`, {level: `warning`, message:`error in page: ${variables?.metadata?.page_name} with variables?.common_button_icon_styles?.unset_state?.icon_color: The use of themes was specified, but an invalid color was imported: ${variables?.common_button_icon_styles?.unset_state?.icon_color}`});
              }
            } else {
              returnedColor = importedColor;
            }

