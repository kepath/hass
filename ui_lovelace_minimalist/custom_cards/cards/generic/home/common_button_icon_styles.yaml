---
common_button_icon_styles:
  variables:
    common_button_icon_styles:
      use_themes: true
      unset_state:
        icon: "mdi:close-circle"
        icon_color: "red"
        background_color: "theme"
      unknown_state:
        use_unknown_state: false
        icon: "mdi:radiobox-marked"
        icon_color: "red"
        background_color: "theme"
      default_state:
        icon: "mdi:checkbox-blank-circle-outline"
        icon_color: "red"
        background_color: "theme"

  icon: >
    [[[
      var backupIcon = "mdi:close-circle";
      var returnedIcon;
      if (typeof variables?.common_button_icon_styles?.unset_state?.icon !== 'undefined') {
        if (variables?.common_button_icon_styles?.unset_state?.icon.includes('mdi:') ||
            variables?.common_button_icon_styles?.unset_state?.icon.includes('cbi:') ||
            variables?.common_button_icon_styles?.unset_state?.icon.includes('simple-icons:')) {
          returnedIcon = variables?.common_button_icon_styles?.unset_state?.icon;
        }
      }
      if (typeof returnedIcon !== 'undefined') {
        return returnedIcon;
      } else {
        return backupIcon;
      }
    ]]]
  styles:
    icon:
      - color: >
          [[[
            var returnedColor;
            var useThemesDefault = true;
            var useThemes;
            const colorOptions = ['grey', 'red', 'green', 'yellow', 'blue', 'purple', 'pink', 'amber', 'theme'];
            if (typeof variables?.common_button_icon_styles?.use_themes !== 'undefined') {
              if (typeof variables?.common_button_icon_styles?.use_themes === 'boolean') {
                useThemes = variables?.common_button_icon_styles?.use_themes;
              } else {
                useThemes = useThemesDefault;
              }
            } else {
              useThemes = useThemesDefault;
            }
            returnedColor = variables?.common_button_icon_styles?.unset_state?.icon_color;
            if (useThemes) {
              for (let i = 0; i < colorOptions.length; i++) {
                if (returnedColor.includes(colorOptions[i])){
                  returnedColor = "rgba(var(--color-" + returnedColor + "), 0.8)";
                }
              }
            }

            return returnedColor;
          ]]]
    img_cell:
      - background-color: >
          [[[
            var returnedColor;
            var useThemesDefault = true;
            var useThemes;
            const colorOptions = ['grey', 'red', 'green', 'yellow', 'blue', 'purple', 'pink', 'amber', 'theme'];
            if (typeof variables?.common_button_icon_styles?.use_themes !== 'undefined') {
              if (typeof variables?.common_button_icon_styles?.use_themes === 'boolean') {
                useThemes = variables?.common_button_icon_styles?.use_themes;
              } else {
                useThemes = useThemesDefault;
              }
            } else {
              useThemes = useThemesDefault;
            }
            returnedColor = variables?.common_button_icon_styles?.unset_state?.background_color;
            if (useThemes) {
              for (let i = 0; i < colorOptions.length; i++) {
                if (returnedColor.includes(colorOptions[i])){
                  returnedColor = "rgba(var(--color-" + returnedColor + "), 0.05)";
                }
              }
            }

            return returnedColor;
          ]]]
  state:
    - operator: "template"
      value: >
        [[[
          var returnValue = false;
          //var useUnknownStateDefault = false;
          var useUnknownState;
          if (typeof variables?.common_button_icon_styles?.unknown_state?.use_unknown_state !== 'undefined') {
            if (typeof variables?.common_button_icon_styles?.unknown_state?.use_unknown_state === 'boolean') {
              useUnknownState = variables?.common_button_icon_styles?.unknown_state?.use_unknown_state;
            //} else {
            //  useUnknownState = useUnknownStateDefault;
            //}
            } //else {
          //  useUnknownState = useUnknownStateDefault;
          }
          if (typeof entity?.state !== "undefined") {
            if (entity?.state == "unavailable" || entity?.state == "unknown") {
              if (useUnknownState) {
                returnValue = true;
              }
            }
          }

          return returnValue;
        ]]]
      icon: >
        [[[
          var backupIcon = "mdi:radiobox-marked";
          var returnedIcon;
          if (typeof variables?.common_button_icon_styles?.unknown_state?.icon !== 'undefined') {
            if (variables?.common_button_icon_styles?.unknown_state?.icon.includes('mdi:') ||
                variables?.common_button_icon_styles?.unknown_state?.icon.includes('cbi:') ||
                variables?.common_button_icon_styles?.unknown_state?.icon.includes('simple-icons:')) {
