---
simple_switch_state:
  variables:
    metadata:
      page_name: "simple_switch_state.yaml"
    binary_switch_state:
      on_state:
        use_themes: true
        icon: "mdi:circle"
        icon_color: "green"
        icon_color_alpha: "1"
        background_color: "green"
        background_color_alpha: "0.2"
      off_state:
        use_themes: true
        icon: "mdi:circle-outline"
        icon_color: "theme"
        icon_color_alpha: "0.5"
        background_color: "theme"
        background_color_alpha: "0.05"

  state:
    - value: "on"
      icon: >
        [[[
          if (typeof variables?.binary_switch_state?.on_state?.icon !== 'undefined') {
            if (variables?.binary_switch_state?.on_state?.icon.includes('mdi:') ||
                variables?.binary_switch_state?.on_state?.icon.includes('cbi:') ||
                variables?.binary_switch_state?.on_state?.icon.includes('simple-icons:')) {
              return variables?.binary_switch_state?.on_state?.icon;
            } else {
              hass.callService(`system_log`, `write`, {level: `warning`, message: `warning in page: ${variables?.metadata?.page_name} with variables?.binary_switch_state?.on_state?.icon: This may not be a valid icon type: ${variables?.binary_switch_state?.on_state?.icon}`});
              return variables?.binary_switch_state?.on_state?.icon;
            }
            hass.callService(`system_log`, `write`, {level: `warning`, message: `error in page: ${variables?.metadata?.page_name} with variables?.binary_switch_state?.on_state?.icon: ${variables?.binary_switch_state?.on_state?.icon}`});
          }
        ]]]
      styles:
        icon:
          - color: >
              [[[
                var importedColor;
                var importedColorAlpha
                var returnedColor;
                var useThemes;
                const colorOptions = ['grey', 'red', 'green', 'yellow', 'blue', 'purple', 'pink', 'amber', 'theme'];
                if (typeof variables?.binary_switch_state?.on_state?.use_themes !== 'undefined') {
                  if (typeof variables?.binary_switch_state?.on_state?.use_themes === 'boolean') {
                    useThemes = variables?.binary_switch_state?.on_state?.use_themes;
                  } else {
                    hass.callService(`system_log`, `write`, {level: `warning`, message: `error in page: ${variables?.metadata?.page_name} with variables?.binary_switch_state?.on_state?.use_themes: ${variables?.binary_switch_state?.on_state?.use_themes}`});
                  }
                } else {
                  hass.callService(`system_log`, `write`, {level: `warning`, message: `error in page: ${variables?.metadata?.page_name} with variables?.binary_switch_state?.on_state?.use_themes: ${variables?.binary_switch_state?.on_state?.use_themes}`});
                }
                if (typeof variables?.binary_switch_state?.on_state?.icon_color !== 'undefined') {
                  importedColor = variables?.binary_switch_state?.on_state?.icon_color;
                } else {
                  hass.callService(`system_log`, `write`, {level: `warning`, message: `error in page: ${variables?.metadata?.page_name} with variables?.binary_switch_state?.on_state?.icon_color: ${variables?.binary_switch_state?.on_state?.icon_color}`});
                }
                if (typeof variables?.binary_switch_state?.on_state?.icon_color_alpha !== 'undefined') {
                  importedColorAlpha = variables?.binary_switch_state?.on_state?.icon_color_alpha;
                } else {
                  hass.callService(`system_log`, `write`, {level: `warning`, message: `error in page: ${variables?.metadata?.page_name} with variables?.binary_switch_state?.on_state?.icon_color_alpha: ${variables?.binary_switch_state?.on_state?.icon_color_alpha}`});
                }
                if (useThemes) {
                  for (let i = 0; i < colorOptions.length; i++) {
                    if (importedColor.includes(colorOptions[i])){
                      returnedColor = "rgba(var(--color-" + importedColor + "), " + importedColorAlpha + ")";
                    }
                  }
                  if (returnedColor.length == 0) {
                    hass.callService(`system_log`, `write`, {level: `warning`, message: `error in page: ${variables?.metadata?.page_name} with variables?.binary_switch_state?.on_state?.icon_color: The use of themes was specified, but an invalid color was imported: ${variables?.binary_switch_state?.on_state?.icon_color}`});
                  }
                } else {
                  returnedColor = importedColor;
                }

                return returnedColor;
              ]]]
