                      returnedColor = "rgba(var(--color-" + returnedColor + "), 0.5)";
                    }
                  }
                }

                return returnedColor;
              ]]]
        img_cell:
          - background-color: >
              [[[
                var returnedColor;
                var useThemesDefault = true;
                var useThemes;
                const colorOptions = ['grey', 'red', 'green', 'yellow', 'blue', 'purple', 'pink', 'amber', 'theme'];
                if (typeof variables?.binary_switch_state?.use_themes !== 'undefined') {
                  if (typeof variables?.binary_switch_state?.use_themes === 'boolean') {
                    useThemes = variables?.binary_switch_state?.use_themes;
