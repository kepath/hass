---
device_dishwasher_state:
  variables:
    device_entity_and_style_binary_count_state:
      data_entities:
        completion_entity: "sensor.dishwasher_remaining_program_time"
      style:
        use_themes: true
        icon: "mdi:dishwasher"
        icon_color: "theme"
        background_color: "theme"

  state:
    - value: "on"
      icon: >
        [[[
          var evaluatedCompletionEntity = variables?.device_entity_and_style_binary_count_state?.data_entities?.completion_entity;
          var returnedIcon = variables?.device_entity_and_style_binary_count_state?.style?.icon;

          var resolvedCompletionState;
          resolvedCompletionState = states[evaluatedProgressEntity].state;
          //hass.callService('system_log', 'write', {level:'warning',message:'resolvedCompletionState: ' + resolvedCompletionState});


          //if (!isNaN(resolvedCompletionState) && typeof resolvedCompletionState !== 'undefined') {
          if (typeof resolvedCompletionState !== 'undefined') {
            //hass.callService('system_log', 'write', {level:'warning',message:'1: '});
            if (!isNaN(Date.parse(resolvedCompletionState))) {
              //hass.callService('system_log', 'write', {level:'warning',message:'2: '});
              var progressMilliseconds = Date.parse(resolvedCompletionState) - Date.now();
              if(!isNaN(parseInt(progressMilliseconds))) {
                //hass.callService('system_log', 'write', {level:'warning',message:'3: '});
                var progressHours = parseInt((progressMilliseconds / (1000 * 60 * 60)).toFixed());
                if(!isNaN(parseInt(progressHours))) {
                  //hass.callService('system_log', 'write', {level:'warning',message:'4: '});
                  if (progressHours >= 0 && progressHours <= 9 ) {
                    //hass.callService('system_log', 'write', {level:'warning',message:'5: '});
                    returnedIcon = "mdi:numeric-" + progressHours + "-circle-outline";
                  }
                }
            }
            }
          }

          return returnedIcon;
        ]]]
      styles:
        icon:
          - color: >
              [[[
                return `rgba(var(--color-${variables?.device_entity_and_style_binary_count_state?.style?.icon_color}),1)`;
              ]]]
        img_cell:
          - background-color: >
              [[[
                return `rgba(var(--color-${variables?.device_entity_and_style_binary_count_state?.style?.background_color}),0.2)`;
              ]]]
