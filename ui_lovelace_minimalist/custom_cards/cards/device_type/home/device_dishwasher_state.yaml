---
device_dishwasher_state:
  variables:
    device_completion_state:
      data_entities:
        completion_entity: "sensor.dishwasher_remaining_program_time"
      on_state:
        # use_themes: true
        icon: "mdi:dishwasher"
        icon_color: "green"
        background_color: "green"
      off_state:
        icon: "mdi:dishwasher-off"
        icon_color: "theme"
        background_color: "theme"

  state:
    - value: "on"
      icon: >
        [[[
          var evaluatedCompletionEntity = variables?.device_completion_state?.data_entities?.completion_entity;
          var returnedIcon = variables?.device_completion_state?.on_state?.icon;
          var resolvedCompletionState = states[evaluatedProgressEntity].state;

          if (typeof resolvedCompletionState !== 'undefined') {
            //hass.callService('system_log', 'write', {level:'warning',message:'1: '});
            if (!isNaN(Date.parse(resolvedCompletionState))) {
              //hass.callService('system_log', 'write', {level:'warning',message:'2: '});
              var progressMilliseconds = Date.parse(resolvedCompletionState) - Date.now();
              if(!isNaN(parseInt(progressMilliseconds))) {
                //hass.callService('system_log', 'write', {level:'warning',message:'3: '});
                var progressHours = parseInt((progressMilliseconds / (1000 * 60 * 60)).toFixed());
                if(!isNaN(parseInt(progressHours))) {
                  //hass.callService('system_log', 'write', {level:'warning',message:'4: '});
                  if (progressHours >= 0 && progressHours <= 9 ) {
                    //hass.callService('system_log', 'write', {level:'warning',message:'5: '});
                    returnedIcon = "mdi:numeric-" + progressHours + "-circle-outline";
                  }
                }
            }
            }
          }

          return returnedIcon;
        ]]]
      styles:
        icon:
          - color: >
              [[[
                return `rgba(var(--color-${variables?.device_completion_state?.on_state?.icon_color}),1)`;
              ]]]
        img_cell:
          - background-color: >
              [[[
                return `rgba(var(--color-${variables?.device_completion_state?.on_state?.background_color}),0.2)`;
              ]]]
    - value: "off"
      icon: >
        [[[
          var backupIcon =  "mdi:circle-outline";
          var returnedIcon;
          if (typeof variables?.device_completion_state?.off_state?.icon !== 'undefined') {
            if (variables?.device_completion_state?.off_state?.icon.includes('mdi:') ||
                variables?.device_completion_state?.off_state?.icon.includes('cbi:') ||
                variables?.device_completion_state?.off_state?.icon.includes('simple-icons:')) {
              returnedIcon = variables?.device_completion_state?.off_state?.icon;
            }
          }
          if (typeof returnedIcon !== 'undefined') {
            return returnedIcon;
          } else {
            return backupIcon;
          }
        ]]]
      styles:
        icon:
          - color: >
              [[[
                var returnedColor;
                var useThemesDefault = true;
                var useThemes;
                const colorOptions = ['grey', 'red', 'green', 'yellow', 'blue', 'purple', 'pink', 'amber', 'theme'];
                if (typeof variables?.device_completion_state?.use_themes !== 'undefined') {
                  if (typeof variables?.device_completion_state?.use_themes === 'boolean') {
                    useThemes = variables?.device_completion_state?.use_themes;
                  } else {
                    useThemes = useThemesDefault;
                  }
                } else {
                  useThemes = useThemesDefault;
                }
                returnedColor = variables?.device_completion_state?.off_state?.icon_color;
                if (useThemes) {
                  for (let i = 0; i < colorOptions.length; i++) {
                    if (returnedColor.includes(colorOptions[i])){
                      returnedColor = "rgba(var(--color-" + returnedColor + "), 0.5)";
                    }
                  }
                }

                return returnedColor;
              ]]]
        img_cell:
          - background-color: >
              [[[
                var returnedColor;
                var useThemesDefault = true;
