---
door_lock_state:
  variables:
    metadata:
      page_name: "door_lock_state.yaml"
    door_lock_state:
      locked_state:
        use_themes: true
        icon: "mdi:lock"
        icon_color: "green"
        icon_color_alpha: "1"
        background_color: "green"
        background_color_alpha: "0.05"
      jammed_state:
        use_themes: true
        icon: "mdi:lock-open-alert"
        icon_color: "red"
        icon_color_alpha: "1"
        background_color: "red"
        background_color_alpha: "0.05"
      door_open_state:
        use_themes: true
        icon: "mdi:door-open"
        icon_color: "yellow"
        icon_color_alpha: "1"
        background_color: "yellow"
        background_color_alpha: "0.05"
  state:
    - value: "locked"
      icon: >
        [[[
          if (typeof variables?.door_lock_state?.locked_state?.icon !== 'undefined') {
            if (variables?.door_lock_state?.locked_state?.icon.includes('mdi:') ||
                variables?.door_lock_state?.locked_state?.icon.includes('cbi:') ||
                variables?.door_lock_state?.locked_state?.icon.includes('simple-icons:')) {
              return variables?.door_lock_state?.locked_state?.icon;
            } else {
              hass.callService(`system_log`, `write`, {level: `warning`,  message:`warning in page: ${variables?.metadata?.page_name} with variables?.door_lock_state?.locked_state?.icon: \nThis may not be a valid icon type: ${variables?.door_lock_state?.locked_state?.icon}`});
              return variables?.door_lock_state?.locked_state?.icon;
            }
            hass.callService(`system_log`, `write`, {level: `warning`,  message:`error in page: ${variables?.metadata?.page_name} with variables?.door_lock_state?.locked_state?.icon: ${variables?.door_lock_state?.locked_state?.icon}`});
          }
        ]]]
      styles:
        icon:
          - color: >
              [[[
                var importedColor;
                var importedColorAlpha
                var returnedColor;
                var useThemes;
                const colorOptions = ['grey', 'red', 'green', 'yellow', 'blue', 'purple', 'pink', 'amber', 'theme'];
                if (typeof variables?.door_lock_state?.locked_state?.use_themes !== 'undefined') {
                  if (typeof variables?.door_lock_state?.locked_state?.use_themes === 'boolean') {
                    useThemes = variables?.door_lock_state?.locked_state?.use_themes;
                  } else {
                    hass.callService(`system_log`, `write`, {level: `warning`, message:`error in page: ${variables?.metadata?.page_name} with variables?.door_lock_state?.locked_state?.use_themes: ${variables?.door_lock_state?.locked_state?.use_themes}`});
                  }
                } else {
                  hass.callService(`system_log`, `write`, {level: `warning`, message:`error in page: ${variables?.metadata?.page_name} with variables?.door_lock_state?.locked_state?.use_themes: ${variables?.door_lock_state?.locked_state?.use_themes}`});
                }
                if (typeof variables?.door_lock_state?.locked_state?.icon_color !== 'undefined') {
                  importedColor = variables?.door_lock_state?.locked_state?.icon_color;
                } else {
                  hass.callService(`system_log`, `write`, {level: `warning`, message:`error in page: ${variables?.metadata?.page_name} with variables?.door_lock_state?.locked_state?.icon_color: ${variables?.door_lock_state?.locked_state?.icon_color}`});
                }
                if (typeof variables?.door_lock_state?.locked_state?.icon_color_alpha !== 'undefined') {
                  importedColorAlpha = variables?.door_lock_state?.locked_state?.icon_color_alpha;
                } else {
                  hass.callService(`system_log`, `write`, {level: `warning`, message:`error in page: ${variables?.metadata?.page_name} with variables?.door_lock_state?.locked_state?.icon_color_alpha: ${variables?.door_lock_state?.locked_state?.icon_color_alpha}`});
                }
                if (useThemes) {
                  for (let i = 0; i < colorOptions.length; i++) {
                    if (importedColor.includes(colorOptions[i])){
                      returnedColor = "rgba(var(--color-" + importedColor + "), " + importedColorAlpha + ")";
                    }
                  }
                  if (returnedColor.length == 0) {
                    hass.callService(`system_log`, `write`, {level: `warning`, message:`error in page: ${variables?.metadata?.page_name} with variables?.door_lock_state?.locked_state?.icon_color: The use of themes was specified, but an invalid color was imported: ${variables?.door_lock_state?.locked_state?.icon_color}`});
                  }
                } else {
                  returnedColor = importedColor;
                }

                return returnedColor;
              ]]]

