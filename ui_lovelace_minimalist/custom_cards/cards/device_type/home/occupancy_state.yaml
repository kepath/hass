---
occupancy_state:
  variables:
    occupancy_state:
      use_themes: true
      not_triggered:
        icon: "mdi:motion-sensor-off"
        icon_color: "theme"
        background_color: "theme"
      triggered_home:
        icon: "mdi:human-greeting"
        icon_color: "green"
        background_color: "green"
      triggered_away:
        icon: "mdi:motion-sensor"
        icon_color: "red"
        background_color: "red"

  state:
    - value: "not_triggered"
      icon: >
        [[[
          var backupIcon =  "mdi:circle-outline";
          var returnedIcon;
          if (typeof variables?.occupancy_state?.not_triggered?.icon !== 'undefined') {
            if (variables?.occupancy_state?.not_triggered?.icon.includes('mdi:') ||
                variables?.occupancy_state?.not_triggered?.icon.includes('cbi:') ||
                variables?.occupancy_state?.not_triggered?.icon.includes('simple-icons:')) {
              returnedIcon = variables?.occupancy_state?.not_triggered?.icon;
            }
          }
          if (typeof returnedIcon !== 'undefined') {
            return returnedIcon;
          } else {
            return backupIcon;
          }
        ]]]
      styles:
        icon:
          - color: >
              [[[
                //var returnedColorDefault = "yellow";
                var returnedColor;
                var useThemesDefault = true;
                var useThemes;
                const colorOptions = ['grey', 'red', 'green', 'yellow', 'blue', 'purple', 'pink', 'amber', 'theme'];
                if (typeof variables?.occupancy_state?.use_themes !== 'undefined') {
                  if (typeof variables?.occupancy_state?.use_themes === 'boolean') {
                    useThemes = variables?.occupancy_state?.use_themes;
                  } else {
                    useThemes = useThemesDefault;
                  }
                } else {
                  useThemes = useThemesDefault;
                }
                //if (typeof variables?.occupancy_state?.not_triggered?.icon_color !== 'undefined') {
                  returnedColor = variables?.occupancy_state?.not_triggered?.icon_color;
                //} else {
                //  returnedColor = returnedColorDefault;
                //}
                if (useThemes) {
                  for (let i = 0; i < colorOptions.length; i++) {
                    if (returnedColor.includes(colorOptions[i])){
                      returnedColor = "rgba(var(--color-" + returnedColor + "), 0.5)";
                    }
                  }
                }

                return returnedColor;
              ]]]
        img_cell:
          - background-color: >
              [[[
                var returnedColorDefault = "yellow";
                var returnedColor;
                var useThemesDefault = true;
                var useThemes;
                const colorOptions = ['grey', 'red', 'green', 'yellow', 'blue', 'purple', 'pink', 'amber', 'theme'];
                if (typeof variables?.occupancy_state?.use_themes !== 'undefined') {
                  if (typeof variables?.occupancy_state?.use_themes === 'boolean') {
                    useThemes = variables?.occupancy_state?.use_themes;
                  } else {
                    useThemes = useThemesDefault;
                  }
                } else {
                  useThemes = useThemesDefault;
                }
                //if (typeof variables?.occupancy_state?.not_triggered?.background_color !== 'undefined') {
                  returnedColor = variables?.occupancy_state?.not_triggered?.background_color;
                //} else {
                //  returnedColor = returnedColorDefault;
                //}
                if (useThemes) {
                  for (let i = 0; i < colorOptions.length; i++) {
                    if (returnedColor.includes(colorOptions[i])){
                      returnedColor = "rgba(var(--color-" + returnedColor + "), 0.05)";
                    }
                  }
                }

                return returnedColor;
              ]]]
