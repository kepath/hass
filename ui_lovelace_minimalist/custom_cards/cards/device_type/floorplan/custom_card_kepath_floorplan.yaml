---
card_kepath_floorplan_binary_item_plug:
  template:
    - "card_kepath_floorplan_common_styles"
  icon: "mdi:power-plug"
  state:
    - operator: "template"
      value: >
        [[[
          var isPowered = false;
          var powerValue;
          if (variables?.floorplan_item_power_usage_denotes_on) {
            if (variables?.floorplan_item_binary_device_power) {
              powerValue = states[variables.floorplan_item_binary_device_power].state
              if (!isNaN(powerValue) && powerValue !== undefined){
                isPowered = true;
              }
            }
          }
          return isPowered;
        ]]]
      styles:
        icon:
          - color: >
              [[[
                var powerValue = 0;
                var color = "rgba(var(--color-theme),1)";
                if (variables?.floorplan_item_binary_device_power) {
                  powerValue = states[variables.floorplan_item_binary_device_power].state
                  if (!isNaN(powerValue) && powerValue !== undefined){
                    powerValue = Math.floor(powerValue);
                  }
                }
                if (powerValue > 10) {
                  color = "rgba(var(--color-green),1)";
                }
                return color;
              ]]]

    - operator: "template"
      value: >
        [[[
          var doesOffMeanStopped = false;
          if (variables?.floorplan_item_binary_device_off_is_stopped) {
            if (typeof variables.floorplan_item_binary_device_off_is_stopped === "boolean") {
              doesOffMeanStopped = variables.floorplan_item_binary_device_off_is_stopped;
            }
          }
          return doesOffMeanStopped;
        ]]]
      styles:
        icon:
          - color: >
              [[[
                var color = "rgba(var(--color-theme),1)";
                if (states[entity.entity_id]?.state) {
                  if (states[entity.entity_id].state == "on") {
                    color = "rgba(var(--color-green),1)";
                  }
                }
                return color;
              ]]]

    - operator: "template"
      value: >
        [[[
          var isOff = false;
          if (states[entity.entity_id]?.state) {
            if (states[entity.entity_id].state == "off") {
              isOff = true;
            }
          }
          return isOff;
        ]]]
      icon: "mdi:power-plug-outline"
      styles:
        icon:
          - color: "rgba(221, 221, 221, 1.0)"

    - operator: "template"
      value: "[[[ return (states[entity.entity_id]?.state == 'unavailable' || states[entity.entity_id]?.state == 'unknown' ? true : false) ]]]"
      styles:
        icon:
          - color: "rgba(var(--color-red), 0.6)"
        img_cell:
          - background-color: "rgba(130, 130, 130, 0.5)"

    - operator: "default"
      styles:
        icon:
          - color: "rgba(var(--color-green), 0.6)"
        img_cell:
          - background-color: "rgba(130, 130, 130, 0.5)"

  tooltip: >
    [[[
      var toolTipText = "unknown plug";
      if ( typeof variables?.floorplan_item_tooltip !== "undefined" ) {
        toolTipText = variables?.floorplan_item_tooltip;
      }
      return toolTipText;
    ]]]
  tap_action:
    action: "more-info"
    entity: >
      [[[
        var moreInfoEntity = entity.entity_id;
        if (variables?.floorplan_item_binary_device_more_info) {
          moreInfoEntity = variables?.floorplan_item_binary_device_more_info;
        }
        return moreInfoEntity;
      ]]]
  hold_action:
    action: "toggle"


card_kepath_floorplan_binary_item_heater:
  template:
    - "card_kepath_floorplan_common_styles"
  icon: "mdi:radiator-disabled"
  styles:
    icon:
      - color: "rgba(221, 221, 221, 1.0)"
  state:
    - value: "on"
      icon: "mdi:radiator"
      styles:
        icon:
          - color: "rgba(var(--color-yellow),1)"
    - template:
      value: "[[[ return (entity?.state == 'unavailable' || entity?.state == 'unknown' ? true : false) ]]]"
      styles:
        icon:
          - color: "rgba(var(--color-red), 0.6)"
        img_cell:
          - background-color: "rgba(130, 130, 130, 0.5)"
      tap_action:
        action: "more-info"
  tap_action:
    action: "toggle"
  hold_action:
    action: "more-info"


card_kepath_floorplan_camera:
  template:
    - "card_kepath_floorplan_common_styles"
  # show_icon: true
  show_label: true
  # show_name: false
  icon: "[[[ return variables.floorplan_camera_icon ]]]"
  label: >
    [[[
      var relativeDate = "unknown";
      if(variables?.floorplan_camera_last_activity_entity) {
        if(variables?.floorplan_camera_last_activity_attribute) {
          relativeDate = states[variables?.floorplan_camera_last_activity_entity].attributes[variables?.floorplan_camera_last_activity_attribute] ? states[variables.floorplan_camera_last_activity_entity].attributes[variables.floorplan_camera_last_activity_attribute] : "unknown"
        } else {
          relativeDate = states[variables?.floorplan_camera_last_activity_entity].state ? states[variables.floorplan_camera_last_activity_entity].state : "unknown"
        }
      }
      return relativeDate.replace("minutes", "mins").replace("minute", "min").replace(" ago", "");
    ]]]
  styles:
    icon:
      - color: "rgba(221, 221, 221, 1.0)"
    img_cell:
      # - border-radius: "50%"
      - height: "30px"
      - width: "30px"
      - border: "2px solid rgba(130, 130, 130, 0.0)"
      - border-color: >
          [[[
            var borderColor = ""
            borderColor += variables?.floorplan_camera_view_borders.includes("top") ? "rgba(221, 221, 221, 1.0) " : "rgba(130, 130, 130, 0.0) "
            borderColor += variables?.floorplan_camera_view_borders.includes("right") ? "rgba(221, 221, 221, 1.0) " : "rgba(130, 130, 130, 0.0) "
            borderColor += variables?.floorplan_camera_view_borders.includes("bottom") ? "rgba(221, 221, 221, 1.0) " : "rgba(130, 130, 130, 0.0) "
            borderColor += variables?.floorplan_camera_view_borders.includes("left") ? "rgba(221, 221, 221, 1.0) " : "rgba(130, 130, 130, 0.0) "

            return borderColor
          ]]]
  state:
    - operator: "template"
      value: "[[[ return (states[variables.floorplan_camera_motion_sensor].state == 'on') ]]]"
      styles:
        icon:
          - color: "rgba(var(--color-green),1)"
        img_cell:
          - background-color: "rgba(var(--color-green), 0.2)"
          - border-color: >
              [[[
                var borderColor = ""
                borderColor += variables?.floorplan_camera_view_borders.includes("top") ? "rgba(var(--color-green),1) " : "rgba(var(--color-green), 0.2) "
                borderColor += variables?.floorplan_camera_view_borders.includes("right") ? "rgba(var(--color-green),1) " : "rgba(var(--color-green), 0.2) "
                borderColor += variables?.floorplan_camera_view_borders.includes("bottom") ? "rgba(var(--color-green),1) " : "rgba(var(--color-green), 0.2) "
                borderColor += variables?.floorplan_camera_view_borders.includes("left") ? "rgba(var(--color-green),1) " : "rgba(var(--color-green), 0.2)"

                return borderColor
              ]]]
    - operator: "template"
      value: "[[[ return (variables?.floorplan_camera_motion_sensor == 'unavailable' || variables?.floorplan_camera_motion_sensor == 'unknown' ? true : false) ]]]"
      styles:
        icon:
          - color: "rgba(var(--color-red), 0.6)"
        img_cell:
          - background-color: "rgba(130, 130, 130, 0.5)"
      tap_action:
        action: "more-info"


card_kepath_floorplan_door:
  template:
    - "card_kepath_floorplan_common_styles"
  show_label: true
  icon: >
    [[[
      var doorIcon = "mdi:door";
      if (variables?.floorplan_door_closed_icon) {
        doorIcon = variables.floorplan_door_closed_icon;
      }
      return doorIcon;
    ]]]
  label: >
    [[[
      var relativeDate = "unknown";
      if(variables?.floorplan_door_last_opened_entity) {
        if(variables?.floorplan_door_last_opened_attribute) {
          relativeDate = states[variables?.floorplan_door_last_opened_entity].attributes[variables?.floorplan_door_last_opened_attribute] ? states[variables.floorplan_door_last_opened_entity].attributes[variables.floorplan_door_last_opened_attribute] : "unknown"
        } else {
          relativeDate = states[variables?.floorplan_door_last_opened_entity].state ? states[variables.floorplan_door_last_opened_entity].state : "unknown"
        }
      }
      return relativeDate.replace("minutes", "mins").replace("minute", "min").replace(" ago", "");
    ]]]
  styles:
    icon:
      - color: "rgba(221, 221, 221, 1.0)"
  tap_action:
    action: "more-info"
  state:
    - value: "on"
      icon: >
        [[[
          var doorIcon = "mdi:door-open";
          if (variables?.floorplan_door_open_icon) {
            doorIcon = variables.floorplan_door_open_icon;
          }
          return doorIcon;
        ]]]
      styles:
        icon:
          - color: "rgba(var(--color-green),1)"
        img_cell:
          - background-color: "rgba(var(--color-green), 0.2)"
    - operator: "template"
      value: "[[[ return (entity?.state == 'unavailable' || entity?.state == 'unknown' ? true : false) ]]]"
      styles:
        icon:
          - color: "rgba(var(--color-red), 0.6)"
        img_cell:
          - background-color: "rgba(130, 130, 130, 0.5)"


card_kepath_floorplan_nest_protect:
  template:
    # - "simple_states_styles"
    - "simple_switch_state"
    - "common_button_icon_styles"
    - "card_kepath_floorplan_common_styles"
    - "navigate_to_parent"
  show_label: true
  icon: "mdi:smoke-detector-variant"
  label: >
    [[[
      var relativeDate = "unknown";
      if(variables?.floorplan_nest_protect_last_activity_entity) {
        if(variables?.floorplan_nest_protect_last_activity_attribute) {
          relativeDate = states[variables?.floorplan_nest_protect_last_activity_entity].attributes[variables?.floorplan_nest_protect_last_activity_attribute] ? states[variables.floorplan_nest_protect_last_activity_entity].attributes[variables.floorplan_nest_protect_last_activity_attribute] : "unknown"
        } else {
          relativeDate = states[variables?.floorplan_nest_protect_last_activity_entity].state ? states[variables.floorplan_nest_protect_last_activity_entity].state : "unknown"
        }
      }
      return relativeDate.replace("minutes", "mins").replace("minute", "min").replace(" ago", "");
    ]]]
  variables:
    common_button_icon_styles:
      default_state:
        use_themes: true
        icon: "mdi:smoke-detector-variant-off"
      unknown_state:
        icon: "mdi:smoke-detector-variant-alert"
      unset_state:
        icon: "mdi:smoke-detector-variant-alert"
    binary_switch_state:
      on_state:
        use_themes: true
        icon: "mdi:smoke-detector-variant"
      off_state:
        use_themes: true
        icon: "mdi:smoke-detector-variant"
    navigation_to_parent_from_entity:
      evaluated_entity: "[[[ return entity.entity_id ]]]"
      return_type: "device"
  styles:
    icon:
      - color: "rgba(221, 221, 221, 1.0)"
    img_cell:
      - width: "75%"
      - height: "75%"
      - max-width: "none"
      - max-height: "none"
      - position: "absolute"
      - left: "50%"
      - top: "50%"
      - transform: "translate(-50%,-50%)"
      - margin-top: "25%"
      - margin-left: "-25%"
      - backdrop-filter: "none"
    card:
      - border-radius: "20px"
      - box-shadow: "var(--box-shadow)"
      - padding: "5px"
      - backdrop-filter: "blur(8px)"
    grid:
      - grid-template-areas: "'l l l l' 'i i i CO' 'i i i heat' 'i i i smoke'"
      - grid-template-columns: "1fr 1fr 1fr 1fr"
      - grid-template-rows: "1fr 1fr 1fr 1fr"
      - justify-items: "center"
  hold_action:
    action: "more-info"
  custom_fields:
    CO:
      card:
        type: "custom:button-card"
        template:
          - "card_kepath_floorplan_common_nest_protect"
        entity:  "[[[ return variables.floorplan_nest_protect_co_status ]]]"
        variables:
          common_button_icon_styles:
            default_state:
              icon: "mdi:molecule-co"
            unknown_state:
              icon: "mdi:molecule-co"
            unset_state:
              icon: "mdi:molecule-co"
          binary_switch_state:
            on_state:
              icon: "mdi:molecule-co"
              icon_color: "blue"
              background_color: "blue"
            off_state:
              icon: "mdi:molecule-co"
              icon_color: "blue"
              icon_color_alpha: "0.2"
        tap_action:
          action: "more-info"
    heat:
      card:
        type: "custom:button-card"
        template:
          - "card_kepath_floorplan_common_nest_protect"
        entity:  "[[[ return variables.floorplan_nest_protect_heat_status ]]]"
        variables:
          common_button_icon_styles:
            default_state:
              icon: "mdi:thermometer"
            unknown_state:
              icon: "mdi:thermometer-alert"
            unset_state:
              icon: "mdi:thermometer-alert"
          binary_switch_state:
            on_state:
              icon: "mdi:thermometer"
              icon_color: "yellow"
              background_color: "yellow"
            off_state:
              icon: "mdi:thermometer-off"
              icon_color: "yellow"
              icon_color_alpha: "0.2"
        tap_action:
          action: "more-info"
    smoke:
      card:
        type: "custom:button-card"
        template:
          - "card_kepath_floorplan_common_nest_protect"
        entity: "[[[ return variables.floorplan_nest_protect_smoke_status ]]]"
        variables:
          common_button_icon_styles:
            default_state:
              icon: "mdi:fire"
            unknown_state:
              icon: "mdi:fire-alert"
            unset_state:
              icon: "mdi:fire-alert"
          binary_switch_state:
            on_state:
              icon: "mdi:fire"
              icon_color: "red"
              background_color: "red"
            off_state:
              icon: "mdi:fire-off"
              icon_color: "red"
              icon_color_alpha: "0.2"
        tap_action:
          action: "more-info"


card_kepath_floorplan_nest_protect_alert:
  template:
    - "card_kepath_floorplan_common_styles"
  icon: "[[[ return variables.card_kepath_floorplan_nest_protect_alert_icon ]]]"
  styles:
    icon:
      - width: "14px"
      - height: "14px"
      - color: "var(--card-background-color)"
    img_cell:
      - background-color: "[[[ return variables.card_kepath_floorplan_nest_protect_alert_color ]]]"
      - height: "16px"
      - width: "16px"
      - backdrop-filter: "none"
    card:
      - height: "100%"
      - box-shadow: "none"
      - padding: "0px"
      - border-radius: "50%"
      - margin: "1px"
  state:
    - operator: "template"
      value: "[[[ return states[variables.card_kepath_floorplan_nest_protect_alert_entity].state ]]]"
      styles:
        img_cell:
          - background-color: "rgba(100, 100, 100, 0.0)"
        card:
          - background-color: "rgba(100, 100, 100, 0.0)"
        icon:
          - color: "rgba(130, 130, 130, 0.3)"
    - operator: "template"
      value: "[[[ return (variables?.card_kepath_floorplan_nest_protect_alert_entity == 'unavailable' || variables?.card_kepath_floorplan_nest_protect_alert_entity == 'unknown' ? true : false) ]]]"
      styles:
        icon:
          - color: "rgba(var(--color-red), 0.6)"
        img_cell:
          - background-color: "rgba(130, 130, 130, 0.5)"
  tap_action:
    action: "more-info"


card_kepath_floorplan_thermostat:
  template:
    - "card_kepath_floorplan_common_styles"
  show_label: true
  show_name: true
  name: >
    [[[
      var currentTemp = "-";
      if (variables?.floorplan_thermostat_current_temperature_attribute) {
        if (states[entity.entity_id].attributes[variables.floorplan_thermostat_current_temperature_attribute]) {
          currentTemp = states[entity.entity_id].attributes[variables.floorplan_thermostat_current_temperature_attribute] + " &#8451;";
        }
      }
      return currentTemp;
    ]]]
  label: >
    [[[
      var currentHumidity = "-";
      if (variables?.floorplan_thermostat_humidity) {
        if (states[variables.floorplan_thermostat_humidity]?.state) {
          currentHumidity = states[variables.floorplan_thermostat_humidity].state + " &percnt;";
        }
      }
      return currentHumidity;
    ]]]
  icon: "mdi:fire-circle"
  styles:
    card:
      - background-color: "rgba(130, 130, 130, 0.3)"
      - border-radius: "20px"
    label:
      - justify-self: "end"
      - align-self: "end"
      - font-size: "10px"
      - margin: "0 6px 0 6px"
    img_cell:
      - background-color: "inherit"
    icon:
      - width: "14px"
      - height: "14px"
      # - line-height: "0"
      - color: "rgba(var(--color-yellow),0.8)"
      - margin-right: "15px"
      - display: "none"
    grid:
      - grid-template-areas: "'. climate_temperature_up climate_temperature_up .' '. climate_wanted_temperature climate_wanted_temperature i' 'l l n n' '. climate_temperature_down climate_temperature_down .'"
      - grid-template-columns: "2fr 1fr 1fr 2fr"
      - grid-template-rows: "16px 1fr 12px 16px"
      - justify-items: "center"
  state:
    - operator: "template"
      value: >
        [[[
          var isHeating = false;
          var useStateAsAction = false;
          if (variables?.floorplan_thermostat_action_use_state) {
            if (typeof variables.floorplan_thermostat_action_use_state === "boolean") {
              useStateAsAction = variables.floorplan_thermostat_action_use_state;
            }
          }

          if (useStateAsAction) {
            if (states[entity.entity_id]?.state) {
              if (states[entity.entity_id].state == "heat") {
                isHeating = true;
              }
            }
          } else {
            if (variables?.floorplan_thermostat_action_attribute) {
              if (states[entity.entity_id]?.attributes[variables.floorplan_thermostat_action_attribute]) {
                if (states[entity.entity_id].attributes[variables.floorplan_thermostat_action_attribute] == "heating") {
                  isHeating = true;
                }
              }
            }
          }
          return isHeating;
        ]]]
      styles:
        icon:
          - display: "inline"

    - operator: "template"
      value: "[[[ return ((states[entity.entity_id]?.state == 'unavailable' || states[entity.entity_id]?.state == 'unknown') ? true : false) ]]]"
      styles:
        custom_fields:
          climate_wanted_temperature:
            name:
              - color: "rgba(var(--color-red), 0.6)"
        card:
          - background-color: "rgba(130, 130, 130, 0.5)"
  tap_action:
    action: "more-info"
  custom_fields:
    climate_wanted_temperature:
      card:
        type: "custom:button-card"
        show_icon: false
        show_label: false
        show_name: true
        name: >
          [[[
            var wantedTemp = "-";
            if (variables?.floorplan_thermostat_wanted_temperature_attribute) {
              if(states[entity.entity_id].attributes[variables.floorplan_thermostat_wanted_temperature_attribute]) {
                wantedTemp = states[entity.entity_id].attributes[variables.floorplan_thermostat_wanted_temperature_attribute];
              }
            }
            return wantedTemp;
          ]]]
        styles:
          name:
            - justify-self: "start"
            - align-self: "start"
            - font-weight: "bold"
            - text-overflow: "ellipsis"
            - overflow: "hidden"
            - font-size: "16px"
            - color: "rgba(221, 221, 221, 1.0)"
          card:
            - background-color: "rgba(100, 100, 100, 0.0)"
            - box-shadow: "none"
        tap_action:
          action: "more-info"
          entity: "[[[ return entity.entity_id ]]]"

    climate_temperature_up:
      card:
        type: "custom:button-card"
        show_icon: true
        show_label: false
        show_name: false
        icon: "mdi:chevron-up"
        styles:
          icon:
            - width: "14px"
            - height: "14px"
            - line-height: "0"
            - color: "rgba(221, 221, 221, 1.0)"
          img_cell:
            - padding: "2px"
          card:
            - background-color: "rgba(100, 100, 100, 0.0)"
            - box-shadow: "none"
        tap_action:
          action: "call-service"
          service: "climate.set_temperature"
          service_data:
            temperature: >
              [[[
                var wantedTemp = parseFloat(0);
                if (variables?.floorplan_thermostat_wanted_temperature_attribute) {
                  if(states[entity.entity_id].attributes[variables.floorplan_thermostat_wanted_temperature_attribute]) {
                    wantedTemp = states[entity.entity_id].attributes[variables.floorplan_thermostat_wanted_temperature_attribute];
                    if (!isNaN(wantedTemp) && wantedTemp !== undefined){
                      wantedTemp = parseFloat(wantedTemp + 1);
                    }
                  }
                }
                return wantedTemp;
              ]]]
            entity_id: "[[[ return entity.entity_id ]]]"

    climate_temperature_down:
      card:
        type: "custom:button-card"
        show_icon: true
        show_label: false
        show_name: false
        icon: "mdi:chevron-down"
        styles:
          icon:
            - width: "14px"
            - height: "14px"
            - line-height: "0"
            - color: "rgba(221, 221, 221, 1.0)"
          img_cell:
            - padding: "2px"
          card:
            - background-color: "rgba(100, 100, 100, 0.0)"
            - box-shadow: "none"
        tap_action:
          action: "call-service"
          service: "climate.set_temperature"
          service_data:
            temperature: >
              [[[
                var wantedTemp = parseFloat(0);
                if (variables?.floorplan_thermostat_wanted_temperature_attribute) {
                  if(states[entity.entity_id].attributes[variables.floorplan_thermostat_wanted_temperature_attribute]) {
                    wantedTemp = states[entity.entity_id].attributes[variables.floorplan_thermostat_wanted_temperature_attribute];
                    if (!isNaN(wantedTemp) && wantedTemp !== undefined){
                      wantedTemp = parseFloat(wantedTemp - 1);
                    }
                  }
                }
                return wantedTemp;
              ]]]
            entity_id: "[[[ return entity.entity_id ]]]"


card_kepath_floorplan_network_item:
  template:
    - "card_kepath_floorplan_common_styles"
    - "ulm_gradient_green_to_red_18step"
  icon: >
    [[[
      return (variables?.floorplan_network_device_icon ? variables.floorplan_network_device_icon : "mdi:network-outline")
    ]]]
  styles:
    icon:
      - color: >
          [[[
            return (variables?.floorplan_network_device_color ? variables.floorplan_network_device_color : "#121212")
          ]]]
    img_cell:
      - background-color: >
          [[[
            var dataSpeed = 0;
            var result = 0;
            var color = "rgba(130, 130, 130, 0.6)";
            const numberArray = [0, 18, 36, 54, 72, 90, 108, 126, 144, 162, 180, 198, 216, 234, 252, 270, 288, 306, 324, 342, 360, 378, 396, 414, 432, 450, 468, 486, 504, 522, 540, 558, 576, 594, 612, 630, 648, 666, 684, 702];
            if (!isNaN(entity?.state)) {
              dataSpeed = Math.floor(entity.state * 100);
              const result = numberArray.findLast(element => element < dataSpeed);
              var gradient = "gradient_" + result;
              if (variables?.green_to_red_18step?.[gradient]) {
                color = variables?.green_to_red_18step?.[gradient];
                color = color.replace("1)", "0.6)"); //add 60% transparency
              }
            }
            return color;
          ]]]
  state:
    - template:
      value: "[[[ return ((states[entity.entity_id]?.state == 'unavailable' || states[entity.entity_id]?.state == 'unknown') ? true : false) ]]]"
      styles:
        img_cell:
          - background-color: "rgba(130, 130, 130, 0.1)"
  tap_action:
    action: "more-info"


card_kepath_floorplan_lock:
  template:
    - "card_kepath_floorplan_common_styles"
  # show_icon: true
  show_label: true
  # show_name: false
  icon: >
    [[[
      var doorIcon = "mdi:lock";
      if (variables?.floorplan_lock_closed_icon) {
        doorIcon = variables.floorplan_lock_closed_icon;
      }
      return doorIcon;
    ]]]
  label: >
    [[[
      var relativeDate = "unknown";
      if(variables?.floorplan_door_last_locked_entity) {
        if(variables?.floorplan_door_last_locked_attribute) {
          relativeDate = states[variables?.floorplan_door_last_locked_entity].attributes[variables?.floorplan_door_last_locked_attribute] ? states[variables.floorplan_door_last_locked_entity].attributes[variables.floorplan_door_last_locked_attribute] : "unknown"
        } else {
          relativeDate = states[variables?.floorplan_door_last_locked_entity].state ? states[variables.floorplan_door_last_locked_entity].state : "unknown"
        }
      }
      return relativeDate.replace("minutes", "mins").replace("minute", "min").replace(" ago", "");
    ]]]
  styles:
    icon:
      - color: "rgba(221, 221, 221, 1.0)"
  tap_action:
    action: "more-info"
  state:
    - value: "unlocked"
      icon: >
        [[[
          var doorIcon = "mdi:lock-open-outline";
          if (variables?.floorplan_lock_open_icon) {
            doorIcon = variables.floorplan_lock_open_icon;
          }
          return doorIcon;
        ]]]
      styles:
        icon:
          - color: "rgba(var(--color-red),1)"
        img_cell:
          - background-color: "rgba(var(--color-red), 0.2)"
    - operator: "template"
      value: "[[[ return (entity?.state == 'unavailable' || entity?.state == 'unknown' ? true : false) ]]]"
      styles:
        icon:
          - color: "rgba(var(--color-red), 0.6)"
        img_cell:
          - background-color: "rgba(130, 130, 130, 0.5)"


card_kepath_floorplan_binary_item:
  template:
    # - "common_objects_and_styles"
    - "simple_states_styles"
    - "simple_switch_state"
    - "common_button_icon_styles"
    - "card_kepath_floorplan_common_styles"
  variables:
    basic_simple_states:
      warning_state:
        use_themes: false
        icon: "mdi:lightbulb-alert"
      error_state:
        icon: "mdi:lightbulb-alert"
    common_button_icon_styles:
      default_state:
        use_themes: false
        icon: "mdi:lightbulb-outline"
        icon_color: "rgba(221, 221, 221, 1.0)"
        background_color: "rgba(130, 130, 130, 0.3)"
      unknown_state:
        icon: "mdi:lightbulb-question"
      unset_state:
        icon: "mdi:lightbulb-question"
    binary_switch_state:
      on_state:
        use_themes: true
        icon: "mdi:lightbulb-on"
        icon_color: "yellow"
        background_color: "theme"
      off_state:
        use_themes: true
        icon: "mdi:lightbulb-outline"
    floorplan_item_tooltip: "unknown item"

  tooltip: >
    [[[
      var toolTipText = "unknown item";
      if ( typeof variables?.floorplan_item_tooltip !== "undefined" ) {
        toolTipText = variables?.floorplan_item_tooltip;
      }
      return toolTipText;
    ]]]
  tap_action:
    action: "toggle"
  hold_action:
    action: "more-info"


